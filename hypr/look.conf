########################################################
# Look and feel - Gruvbox, pure-black, minimal motions
########################################################

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    # Gruvbox: inactive border = bg1, active border = yellow accent
    col.inactive_border = rgba(3c3836ff)
    col.active_border = rgba(d79921ff)

    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 4

    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = true
	size = 4
	passes = 2
	new_optimizations = true
	ignore_opacity = true
    }

    shadow {
        enabled = true
	range = 12
	render_power = 2
	color = rgba(00000088)
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeOutCubic,0.33,1,0.68,1
    bezier = linear,0,0,1,1

    animation = windows, 1, 3, easeOutQuint
    animation = windowsIn, 1, 3, easeOutCubic
    animation = windowsOut, 1, 2, linear
    animation = fade, 1, 3, easeOutQuint
    animation = workspaces, 1, 4, easeOutQuint
    animation = border, 1, 8, linear
}

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgba(1d2021ff)
}

env = HYPRCURSOR_THEME,Bibata-Modern-Classic
