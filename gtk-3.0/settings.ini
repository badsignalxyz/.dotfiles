[Settings]
gtk-theme-name=Adwaita-dark
gtk-icon-theme-name=Papirus-Dark
gtk-font-name=JetBrainsMono Nerd Font 10
gtk-cursor-theme-name=Bibata-Modern-Classic
gtk-cursor-theme-size=24
gtk-application-prefer-dark-theme=1

# For a closer Gruvbox match than stock Adwaita-dark, install
# `gruvbox-gtk-theme` from the AUR (review the PKGBUILD first, build in
# the clean chroot per your install runbook's Phase 10.2) and switch
# gtk-theme-name to whatever it installs as, typically "Gruvbox-Dark-B".
