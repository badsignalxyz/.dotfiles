##############################################
# badsignal's tmux.conf
##############################################

# ---- Core behavior -----------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",foot:RGB,foot:Tc"
set -g mouse on
set -g history-limit 10000
set -g escape-time 0          # no delay on Esc — matters for vim/nvim
set -g focus-events on
set -g base-index 1           # windows start at 1, not 0
setw -g pane-base-index 1
set -g renumber-windows on

# Prefix: keep default Ctrl-b, change here if you want Ctrl-a instead
# set -g prefix C-a
# unbind C-b
# bind C-a send-prefix

# ---- Sane splits ----------------------------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded config"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Status bar position: TOP ----------------------------------------
set -g status-position top

# ---- Gruvbox palette (matches PALETTE.md) -----------------------------
# bg0_h  #1d2021   bg0  #282828   bg1  #3c3836   bg2  #504945
# fg0    #ebdbb2   fg4  #a89984
# yellow #d79921   aqua #689d6a   blue #458588   red  #cc241d

set -g status-style "bg=#1d2021,fg=#ebdbb2"
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 100

# Left: session name, pill-style
set -g status-left "#[bg=#d79921,fg=#1d2021,bold] #S #[bg=#1d2021,fg=#d79921]"

# Right: host, date, time — same pill style mirrored
set -g status-right "#[fg=#689d6a]#[bg=#689d6a,fg=#1d2021] #h #[bg=#1d2021,fg=#689d6a]#[fg=#a89984] %Y-%m-%d #[fg=#ebdbb2,bold]%H:%M "

# ---- Window list styling ----------------------------------------------
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#3c3836,fg=#fabd2f,bold] #I:#W #[bg=#1d2021,fg=#3c3836]"
setw -g window-status-style "fg=#a89984"
setw -g window-status-current-style "fg=#fabd2f,bold"
setw -g window-status-separator ""
setw -g window-status-activity-style "fg=#cc241d,bold"

# ---- Pane borders -------------------------------------------------------
set -g pane-border-style "fg=#3c3836"
set -g pane-active-border-style "fg=#d79921"

# ---- Message / command-line styling -------------------------------------
set -g message-style "bg=#d79921,fg=#1d2021,bold"
set -g message-command-style "bg=#3c3836,fg=#ebdbb2"

# ---- Copy mode (vi-style) -------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi Escape send-keys -X cancel

# ---- Clock mode color ------------------------------------------------------
set -g clock-mode-colour "#d79921"
set -g clock-mode-style 24
