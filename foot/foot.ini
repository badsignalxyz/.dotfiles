[main]
font=JetBrainsMono Nerd Font:size=11
dpi-aware=yes
pad=10x10

[colors-dark]
background=1d2021
foreground=ebdbb2
cursor=1d2021 d79921

# Gruvbox 16-color
regular0=282828   # black
regular1=cc241d   # red
regular2=98971a   # green
regular3=d79921   # yellow
regular4=458588   # blue
regular5=b16286   # purple
regular6=689d6a   # aqua
regular7=a89984   # white/fg4

bright0=928374    # bright black
bright1=fb4934    # bright red
bright2=b8bb26    # bright green
bright3=fabd2f    # bright yellow
bright4=83a598    # bright blue
bright5=d3869b    # bright purple
bright6=8ec07c    # bright aqua
bright7=ebdbb2    # bright white

[cursor]
style=block

[mouse]
hide-when-typing=yes

[scrollback]
lines=10000

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+r
font-increase=Control+plus
font-decrease=Control+minus
font-reset=Control+0
